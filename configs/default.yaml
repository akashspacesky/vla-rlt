# groot-rlt default configuration
# Override task-specific values in configs/tasks/*.yaml

run_name: "rlt_default"
device: "cuda"
seed: 42

# ── Model ────────────────────────────────────────────────────────────────────
rlt_dim: 256              # RL token dimensionality
action_dim: 7             # Robot DoF per timestep
chunk_size: 16            # Action chunk length (must match GR00T config)
action_scale: 0.1         # Max delta magnitude (tune per task)
num_hook_layers: 4        # Number of VLM layers to hook for hidden states
seq_len: 512              # Expected VLM sequence length

encoder:
  num_heads: 8
  num_layers: 2
  dropout: 0.1

decoder:
  num_heads: 8
  num_layers: 2

actor:
  hidden_dim: 512
  num_layers: 3

critic:
  hidden_dim: 512
  num_layers: 3

# ── Training ─────────────────────────────────────────────────────────────────
actor_lr: 3.0e-4
critic_lr: 3.0e-4
alpha_lr: 3.0e-4
gamma: 0.99
tau: 0.005                # Soft target update rate
init_alpha: 0.2           # Initial SAC entropy temperature
gradient_clip: 1.0

# Reference regularization (key RLT hyperparameter)
ref_reg_weight: 0.1       # λ: L2 penalty weight toward VLA reference action

# Reference-action dropout annealing
ref_dropout_prob: 0.3     # Final plateau dropout probability
dropout_warmup_steps: 1000

# Online RL loop
total_steps: 50000
warm_up_steps: 1000
updates_per_step: 200     # SAC updates per env step (enables fast on-robot learning)
batch_size: 256
min_buffer_size: 1000

# Replay buffer
buffer_capacity: 100000
human_demo_ratio: 0.25    # Fraction of each batch from human demos

# Checkpointing
checkpoint_dir: "runs"
checkpoint_every: 5000
keep_checkpoints: 3

# Phase 1 pre-training
pretrain_lr: 1.0e-4
pretrain_batch_size: 32
pretrain_epochs: 50

# Logging
wandb:
  enabled: true
  project: "groot-rlt"

# GR00T
groot:
  model_path: null          # Path to GR00T N1 checkpoint (or HF model ID)
  embodiment_tag: "LIBERO_PANDA"
  freeze: true
