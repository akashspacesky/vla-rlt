# vla-rlt default configuration
# Tuned for: SmolVLA + SO-101 + M2 MacBook Air 8GB (MPS)

run_name: "rlt_default"
device: "auto"            # auto = cuda > mps > cpu

seed: 42

# ── VLA backend ───────────────────────────────────────────────────────────────────────────────
vla:
  backend: "smolvla"
  model_id: "lerobot/smolvla_base"
  num_hook_layers: 4        # Hook last 4 SmolVLM-2 transformer layers

# ── Model dims (SmolVLA / SmolVLM-2 defaults) ───────────────────────────────────────────
rlt_dim: 128              # RL token dim — kept small for 8GB
action_dim: 6             # SO-101: 6 DoF (5 joints + gripper)
chunk_size: 50            # SmolVLA base outputs 50-step chunks
action_scale: 0.1
seq_len: 812              # SmolVLA base: 203 tokens/layer * 4 hook layers (measured)

encoder:
  num_heads: 4            # Smaller heads for MPS memory
  num_layers: 2
  dropout: 0.1

decoder:
  num_heads: 4
  num_layers: 2

actor:
  hidden_dim: 256         # Smaller than GR00T version — MPS-friendly
  num_layers: 3

critic:
  hidden_dim: 256
  num_layers: 3

# ── Training ──────────────────────────────────────────────────────────────────────────────────
actor_lr: 3.0e-4
critic_lr: 3.0e-4
alpha_lr: 3.0e-4
gamma: 0.99
tau: 0.005
init_alpha: 0.2
gradient_clip: 1.0

ref_reg_weight: 0.1
ref_dropout_prob: 0.3
dropout_warmup_steps: 500   # Shorter warmup for faster iteration

total_steps: 20000          # Reduced for on-robot real-world training
warm_up_steps: 500
updates_per_step: 50        # Reduced vs GR00T version — MPS is slower than CUDA
batch_size: 16              # Small batch for 8GB
min_buffer_size: 500

buffer_capacity: 50000      # Reduced footprint
human_demo_ratio: 0.25

checkpoint_dir: "runs"
checkpoint_every: 2000
keep_checkpoints: 3

pretrain_lr: 1.0e-4
pretrain_batch_size: 8      # Small for MPS
pretrain_epochs: 30

wandb:
  enabled: true
  project: "vla-rlt"
