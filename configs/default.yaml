# groot-rlt default configuration\n# Tuned for: SmolVLA + SO-101 + M2 MacBook Air 8GB (MPS)\n\nrun_name: \"rlt_default\"\ndevice: \"auto\"            # auto = cuda > mps > cpu\n\nseed: 42\n\n# VLA backend\nvla:\n  backend: \"smolvla\"\n  model_id: \"lerobot/smolvla_base\"\n  num_hook_layers: 4\n\n# Model dims (SmolVLA / SmolVLM-2)\nrlt_dim: 128\naction_dim: 6             # SO-101: 6 DoF\nchunk_size: 16\naction_scale: 0.1\nseq_len: 256              # 64 visual tokens * 4 hook layers\n\nencoder:\n  num_heads: 4\n  num_layers: 2\n  dropout: 0.1\n\ndecoder:\n  num_heads: 4\n  num_layers: 2\n\nactor:\n  hidden_dim: 256\n  num_layers: 3\n\ncritic:\n  hidden_dim: 256\n  num_layers: 3\n\n# Training\nactor_lr: 3.0e-4\ncritic_lr: 3.0e-4\nalpha_lr: 3.0e-4\ngamma: 0.99\ntau: 0.005\ninit_alpha: 0.2\ngradient_clip: 1.0\n\nref_reg_weight: 0.1\nref_dropout_prob: 0.3\ndropout_warmup_steps: 500\n\ntotal_steps: 20000\nwarm_up_steps: 500\nupdates_per_step: 50\nbatch_size: 16\nmin_buffer_size: 500\n\nbuffer_capacity: 50000\nhuman_demo_ratio: 0.25\n\ncheckpoint_dir: \"runs\"\ncheckpoint_every: 2000\nkeep_checkpoints: 3\n\npretrain_lr: 1.0e-4\npretrain_batch_size: 8\npretrain_epochs: 30\n\nwandb:\n  enabled: true\n  project: \"groot-rlt\"\n