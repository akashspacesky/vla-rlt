[build-system]\nrequires = [\"setuptools>=68\", \"wheel\"]\nbuild-backend = \"setuptools.build_meta\"\n\n[project]\nname = \"groot-rlt\"\nversion = \"0.2.0\"\ndescription = \"RL Tokens for open-source VLAs — SmolVLA + SO-101, MPS-native\"\nauthors = [{ name = \"akashspacesky\" }]\nreadme = \"README.md\"\nlicense = { text = \"MIT\" }\nrequires-python = \">=3.10\"\ndependencies = [\n    \"torch>=2.1.0\",\n    \"torchvision>=0.16.0\",\n    \"numpy>=1.24.0\",\n    \"einops>=0.7.0\",\n    \"hydra-core>=1.3.0\",\n    \"omegaconf>=2.3.0\",\n    \"wandb>=0.16.0\",\n    \"gymnasium>=0.29.0\",\n    \"tqdm>=4.66.0\",\n    \"scipy>=1.11.0\",\n]\n\n[project.optional-dependencies]\ndev = [\n    \"pytest>=7.4.0\",\n    \"pytest-cov>=4.1.0\",\n    \"black>=23.0.0\",\n    \"ruff>=0.1.0\",\n]\nrobot = [\n    \"lerobot>=0.1.0\",\n]\n\n[tool.setuptools.packages.find]\nwhere = [\".\"]\ninclude = [\"rlt*\"]\n\n[tool.black]\nline-length = 100\ntarget-version = [\"py310\"]\n\n[tool.ruff]\nline-length = 100\nselect = [\"E\", \"F\", \"I\"]\n\n[tool.pytest.ini_options]\ntestpaths = [\"tests\"]\naddopts = \"-v --tb=short\"\n